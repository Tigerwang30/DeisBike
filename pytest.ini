[pytest]
# Only collect the real in-process unit tests. The scripts under
# tests/diagnostics/ hit a live server at import time and must be run
# manually (`python tests/diagnostics/<file>.py`), never collected — that
# is what used to make a bare `pytest` crash.
testpaths = tests/unit
# Put the repo root on sys.path so tests can `import api.*` / `tools.*`
# under a bare `pytest` invocation (not just `python -m pytest`).
pythonpath = .
